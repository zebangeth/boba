<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#212529" text-anchor="start" opacity="1"><tspan x="147" y="74">PawPal Companion State Machine with Chat Provider</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#495057" text-anchor="start" opacity="1"><tspan x="149" y="99">Narrow stacked layout: arrows stay inside their panel, and cross-system behavior is summarized in the priority flow.</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#212529" text-anchor="start" opacity="1"><tspan x="161" y="171">1. Original companion state machine</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#212529" text-anchor="start" opacity="1"><tspan x="161" y="666">2. Chat provider session overlay</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#212529" text-anchor="start" opacity="1"><tspan x="161" y="1191">3. Compatibility / priority rule</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="310" y="270">Base companion</tspan><tspan x="310" y="289">idle or focusGuard</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="310" y="465">Happy feedback</tspan><tspan x="310" y="484">auto return</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="680" y="243">Reminder prompt</tspan><tspan x="680" y="262">break / hydration</tspan><tspan x="680" y="281">focus warning</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="680" y="405">Break run</tspan><tspan x="680" y="424">blockingMode</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="1020" y="405">Completion states</tspan><tspan x="1020" y="424">return afterward</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="447" y="245">timer / warning</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="325" y="370">pet click</tspan><tspan x="325" y="384">chat off</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="162" y="390">auto</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="697" y="340">break done</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="820" y="390">done / timer</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="1077" y="300">snooze / done / back</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="672" y="535">resume base</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="312" y="752">Stored session</tspan><tspan x="312" y="771">bubble hidden</tspan><tspan x="312" y="790">no state lock</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="315" y="900">Chat open</tspan><tspan x="315" y="919">lock happy / last state</tspan><tspan x="315" y="938">input visible</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="315" y="1050">Waiting provider</tspan><tspan x="315" y="1069">lock focusGuard</tspan><tspan x="315" y="1088">/think:low</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="680" y="900">Reply shown</tspan><tspan x="680" y="919">lock API state</tspan><tspan x="680" y="938">input visible</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="1020" y="763">Session ended</tspan><tspan x="1020" y="782">close or 8h expiry</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="1020" y="1050">Provider disabled</tspan><tspan x="1020" y="1069">setup bubble</tspan><tspan x="1020" y="1088">lock happy</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="333" y="840">restore / click</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="333" y="990">send</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="469" y="1034">reply parsed</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="533" y="990">next message</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="159" y="842">minimize</tspan><tspan x="159" y="856">or 3m</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="822" y="838">close</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="652" y="748">8h expiry</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="737" y="820">close</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="1035" y="920">close</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#495057" text-anchor="start" opacity="1"><tspan x="557" y="1036">State from provider is parsed from reply JSON.</tspan><tspan x="557" y="1052">Displayed answer strips state keywords.</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#343a40" text-anchor="start" opacity="1"><tspan x="172" y="1232">Priority: blockingMode &gt; companionLockedState &gt; base petState.</tspan><tspan x="172" y="1249">Reminder restores chat only if it interrupted current chat and the session already has a user+assistant round.</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="268" y="1345">Chat/setup</tspan><tspan x="268" y="1364">lock active</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="502" y="1345">Reminder fires</tspan><tspan x="502" y="1364">break/hydration/focus</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="748" y="1345">Release chat lock</tspan><tspan x="748" y="1364">and hide bubble</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="1008" y="1345">Original reminder</tspan><tspan x="1008" y="1364">owns petState</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="503" y="1480">Reminder ends</tspan><tspan x="503" y="1499">completion flow</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="742" y="1479">Interrupted session</tspan><tspan x="742" y="1498">restore chat</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1"><tspan x="1007" y="1480">No session</tspan><tspan x="1007" y="1499">idle or focusGuard</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="767" y="1400">when reminder completes</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="607" y="1468">if interrupted</tspan><tspan x="607" y="1482">chat has a round</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#343a40" text-anchor="start" opacity="1"><tspan x="737" y="1528">otherwise</tspan></text>
<text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#495057" text-anchor="start" opacity="1"><tspan x="172" y="1561">Code check: reminder entry calls interruptCompanionSessionForReminder();</tspan><tspan x="172" y="1577">setup lock is released even when there is no active session.</tspan></text>
</svg>
